<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ReplyRate</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --surface: #f6f5f8;
    --text: #1a1614;
    --text-muted: #6b6878;
    --border: #e7e4ec;
    --accent: #7c5dff;
    --accent-text: #ffffff;
    --error: #c0392b;
    /* Wave 1 task 9: stage colour tokens. Spec "Visual tokens": Saved
       (neutral), Applied (blue), Replied (yellow), Interviewing (purple),
       Offer (green), Rejected (muted/grey). Defined now; applied to row
       badges (commit 3) and stage dropdown (commit 5). */
    --stage-saved:        var(--text-muted);
    --stage-applied:      #3b82f6;
    --stage-replied:      #eab308;
    --stage-interviewing: #8b5cf6;
    --stage-offer:        #22c55e;
    --stage-rejected:     var(--text-muted);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #15131a;
      --surface: #1e1b24;
      --text: #f3f1f7;
      --text-muted: #9b97a6;
      --border: #2c2935;
      --error: #ff6b5b;
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.45;
    display: flex;
    flex-direction: column;
  }
  .rr-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .rr-brand { display: flex; align-items: center; gap: 10px; }
  .rr-logo {
    width: 28px; height: 28px;
    display: grid; place-items: center;
    background: var(--accent);
    color: var(--accent-text);
    border-radius: 8px;
    font-weight: 700;
    font-size: 14px;
  }
  .rr-title { margin: 0; font-size: 14px; font-weight: 600; }
  .rr-state-pill {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 4px 8px;
    border-radius: 999px;
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .rr-main { flex: 1; padding: 20px 16px; overflow-y: auto; }
  .rr-state { display: none; flex-direction: column; }
  .rr-state-loading,
  .rr-state-collapsed,
  .rr-state-error { gap: 12px; align-items: flex-start; }
  .rr-state-ready  { gap: 0; align-items: stretch; margin: -20px -16px; }
  body[data-state="loading"]   .rr-state[data-show-on="loading"],
  body[data-state="collapsed"] .rr-state[data-show-on="collapsed"],
  body[data-state="ready"]     .rr-state[data-show-on="ready"],
  body[data-state="error"]     .rr-state[data-show-on="error"] { display: flex; }
  .rr-state-msg { margin: 0; color: var(--text-muted); }
  .rr-state-error .rr-state-msg { color: var(--error); }
  .rr-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
  }
  .rr-btn:hover { border-color: var(--accent); color: var(--accent); }
  .rr-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .rr-spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: rr-spin 0.8s linear infinite;
  }
  @keyframes rr-spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    .rr-spinner { animation-duration: 2s; }
  }

  /* Wave 1 task 9 part 1: tab navigation shell. */
  .rr-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 1;
  }
  .rr-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 10px 4px 8px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    color: var(--text-muted);
    font: inherit;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
  }
  .rr-tab:hover { color: var(--text); }
  .rr-tab[aria-selected="true"] {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .rr-tab:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .rr-tab-icon { display: block; }
  .rr-tab-icon svg { width: 20px; height: 20px; display: block; }
  .rr-tab-label { display: block; }
  .rr-tab-content { padding: 20px 16px; }
  .rr-tabpanel[hidden] { display: none; }

  .rr-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 12px;
    padding: 40px 16px;
    min-height: 240px;
    color: var(--text-muted);
  }
  .rr-empty-icon { color: var(--text-muted); opacity: 0.5; }
  .rr-empty-icon svg { width: 48px; height: 48px; display: block; }
  .rr-empty-heading { margin: 0; font-size: 14px; font-weight: 600; color: var(--text); }
  .rr-empty-body { margin: 0; font-size: 13px; color: var(--text-muted); max-width: 280px; line-height: 1.5; }

  /* Wave 1 task 9 part 2: tracker scaffold. */
  .rr-stage-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 4px 0 12px;
  }
  .rr-chip {
    appearance: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text);
    font: inherit;
    cursor: pointer;
    padding: 6px 10px;
  }
  .rr-chip:hover { border-color: var(--text-muted); }
  .rr-chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  /* Selected chip styling (commit 4 will toggle aria-pressed). */
  .rr-chip[aria-pressed="true"] {
    border-color: var(--accent);
    color: var(--accent);
  }
  .rr-chip-all {
    font-size: 11px;
    font-weight: 600;
  }
  .rr-chip:not(.rr-chip-all) {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 60px;
  }
  .rr-chip-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-muted);
  }
  .rr-chip-count {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  /* Loading skeleton. */
  .rr-tracker-skeleton { display: flex; flex-direction: column; gap: 12px; }
  .rr-list-skeleton { display: flex; flex-direction: column; gap: 8px; }
  .rr-skeleton {
    background: linear-gradient(90deg, var(--surface) 0%, var(--border) 50%, var(--surface) 100%);
    background-size: 200% 100%;
    animation: rr-shimmer 1.4s ease-in-out infinite;
    border-radius: 6px;
  }
  .rr-skeleton-strip { display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 0; }
  .rr-skeleton-chip { height: 44px; width: 64px; }
  .rr-skeleton-chip-all { height: 28px; width: 56px; align-self: center; }
  .rr-skeleton-row { height: 56px; width: 100%; }
  @keyframes rr-shimmer {
    0%   { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .rr-skeleton { animation: none; }
  }

  /* Wave 1 task 9 part 3: job list. */
  .rr-job-list { display: flex; flex-direction: column; gap: 4px; padding: 4px 0; }

  .rr-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 8px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
    background-color: transparent;
  }
  .rr-row:hover { background-color: var(--surface); }
  .rr-row:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .rr-row[data-stage="rejected"] { opacity: 0.6; }

  .rr-row-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .rr-row-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rr-row-company {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rr-row-meta { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .rr-row-sep { color: var(--text-muted); }
  .rr-row-time { color: var(--text-muted); font-variant-numeric: tabular-nums; }

  /* Source badges. Auto-width pills with full source names. LinkedIn and
     Indeed have enough contrast with white text; Lever's #2eb88a fails
     WCAG AA with white (~2.5:1), so dark green text for that one. */
  .rr-source-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #ffffff;
    flex-shrink: 0;
    margin-top: 2px;
    white-space: nowrap;
  }
  .rr-source-badge[data-source="linkedin"] { background-color: #0a66c2; }
  .rr-source-badge[data-source="lever"]    { background-color: #2eb88a; color: #0a3d2c; }
  .rr-source-badge[data-source="indeed"]   { background-color: #003a9b; }
  .rr-source-badge[data-source="unknown"]  { background-color: var(--text-muted); }

  /* Per-row stage chip. Outline style: coloured text + coloured border. */
  .rr-row-stage {
    display: inline-flex;
    align-items: center;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border: 1px solid;
    flex-shrink: 0;
    margin-top: 2px;
    background: transparent;
  }
  .rr-row-stage[data-stage="saved"]        { color: var(--stage-saved);        border-color: var(--stage-saved); }
  .rr-row-stage[data-stage="applied"]      { color: var(--stage-applied);      border-color: var(--stage-applied); }
  .rr-row-stage[data-stage="replied"]      { color: var(--stage-replied);      border-color: var(--stage-replied); }
  .rr-row-stage[data-stage="interviewing"] { color: var(--stage-interviewing); border-color: var(--stage-interviewing); }
  .rr-row-stage[data-stage="offer"]        { color: var(--stage-offer);        border-color: var(--stage-offer); }
  .rr-row-stage[data-stage="rejected"]     { color: var(--stage-rejected);     border-color: var(--stage-rejected); }

  /* Flash on newly-added rows (~1.5s, fades to transparent). */
  @keyframes rr-row-flash {
    0%   { background-color: rgba(124, 93, 255, 0.18); }
    100% { background-color: transparent; }
  }
  .rr-row-new { animation: rr-row-flash 1.5s ease-out; }
  @media (prefers-reduced-motion: reduce) {
    .rr-row-new { animation: none; }
  }

  /* Wave 1 task 9 part 4: filter affordances. */
  .rr-link {
    background: none;
    border: none;
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 0;
  }
  .rr-link:hover { opacity: 0.85; }
  .rr-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 2px; }

  /* Filtered-empty state: smaller than the no-jobs-ever empty state. */
  .rr-filtered-empty {
    min-height: 120px;
    padding: 24px 16px;
    gap: 8px;
  }

  /* Wave 1 task 9 part 5: stage dropdown, overflow menu, dialog, toast. */

  /* StageDropdown trigger inherits .rr-row-stage styling from commit 3. */
  .rr-stage-dropdown-trigger {
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .rr-stage-dropdown-trigger:hover { background-color: rgba(124, 93, 255, 0.06); }
  .rr-stage-dropdown-trigger:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .rr-stage-dropdown-trigger[aria-expanded="true"] { border-color: var(--accent); }
  .rr-stage-dropdown-trigger[aria-busy="true"] { opacity: 0.55; }
  .rr-stage-dropdown-trigger::after {
    content: '';
    width: 0; height: 0;
    border-left: 3px solid transparent;
    border-right: 3px solid transparent;
    border-top: 3px solid currentColor;
    margin-left: 2px;
  }

  /* Listbox (portal). */
  .rr-listbox {
    position: fixed;
    z-index: 1000;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    padding: 4px;
    margin: 0;
    list-style: none;
    min-width: 140px;
    max-height: 280px;
    overflow-y: auto;
    font-size: 12px;
  }
  .rr-listbox:focus { outline: 2px solid var(--accent); outline-offset: -2px; }
  .rr-option {
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .rr-option:hover,
  .rr-option.rr-option-active { background-color: var(--surface); }
  .rr-option[aria-selected="true"] { color: var(--accent); font-weight: 600; }
  .rr-option[aria-selected="true"]::before {
    content: '\2713';
    font-size: 11px;
    color: var(--accent);
  }
  .rr-option:not([aria-selected="true"])::before {
    content: '';
    width: 11px;
  }

  /* Row stage area: stacks dropdown trigger and any error pill above it. */
  .rr-row-stage-area {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }
  .rr-row-error-pill {
    font-size: 10px;
    font-weight: 600;
    color: #ffffff;
    background: var(--error);
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
  }

  /* Overflow menu trigger. */
  .rr-row-overflow-area { flex-shrink: 0; align-self: flex-start; margin-top: 2px; }
  .rr-overflow-trigger {
    background: none;
    border: none;
    border-radius: 4px;
    padding: 4px;
    cursor: pointer;
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .rr-overflow-trigger:hover { background-color: var(--surface); color: var(--text); }
  .rr-overflow-trigger:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .rr-overflow-trigger svg { display: block; }

  /* Overflow menu (portal). */
  .rr-menu {
    position: fixed;
    z-index: 1000;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    padding: 4px;
    margin: 0;
    list-style: none;
    min-width: 160px;
    font-size: 13px;
  }
  .rr-menu:focus { outline: none; }
  .rr-menuitem {
    padding: 8px 12px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--text);
  }
  .rr-menuitem:hover,
  .rr-menuitem.rr-menuitem-active { background-color: var(--surface); }
  .rr-menuitem-destructive { color: var(--error); }

  /* Confirm dialog (modal). */
  .rr-dialog-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1100;
    padding: 24px;
  }
  .rr-dialog {
    background: var(--bg);
    border-radius: 12px;
    padding: 20px;
    max-width: 320px;
    width: 100%;
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.28);
  }
  .rr-dialog-heading { margin: 0 0 8px 0; font-size: 15px; font-weight: 600; color: var(--text); }
  .rr-dialog-body    { margin: 0 0 16px 0; font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .rr-dialog-actions { display: flex; justify-content: flex-end; gap: 8px; }
  .rr-btn-secondary {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 8px 14px; border-radius: 8px; font: inherit; font-weight: 600; cursor: pointer;
  }
  .rr-btn-secondary:hover { border-color: var(--text-muted); }
  .rr-btn-secondary:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .rr-btn-destructive {
    background: var(--error); border: 1px solid var(--error); color: #ffffff;
    padding: 8px 14px; border-radius: 8px; font: inherit; font-weight: 600; cursor: pointer;
  }
  .rr-btn-destructive:hover { opacity: 0.9; }
  .rr-btn-destructive:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Toast (bottom-center, replaceable). */
  .rr-toast {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--bg);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 1000;
    max-width: calc(100% - 32px);
  }
  .rr-toast-action {
    background: none;
    border: none;
    color: var(--accent);
    font: inherit;
    font-weight: 700;
    text-decoration: underline;
    cursor: pointer;
    padding: 0;
  }
  .rr-toast-action:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 2px; }

  /* Tracker error state. */
  .rr-tracker-error {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 12px;
    padding: 40px 16px;
  }
  .rr-tracker-error-heading { margin: 0; font-size: 14px; font-weight: 600; color: var(--text); }
  .rr-tracker-error-detail  { margin: 0; font-size: 12px; color: var(--text-muted); max-width: 280px; line-height: 1.5; }

  /* Wave 2 task 1 follow-on: header actions wrapper (save button + user menu). */
  .rr-header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Save-this-page button: 32px square icon-only, sits left of user menu. */
  .rr-save-active-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    background: none;
    border: none;
    border-radius: 8px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0;
    flex-shrink: 0;
  }
  .rr-save-active-btn:hover { background-color: var(--surface); color: var(--text); }
  .rr-save-active-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .rr-save-active-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .rr-save-active-btn svg { width: 18px; height: 18px; display: block; }
  .rr-save-active-btn .rr-spinner { margin-right: 0; }

  /* Wave 2 task 1: header user menu, contacts auth scaffold. */

  .rr-user-menu {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .rr-user-trigger {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    border-radius: 8px;
    padding: 4px 8px;
    color: var(--text);
    font: inherit;
    cursor: pointer;
  }
  .rr-user-trigger:hover { background-color: var(--surface); }
  .rr-user-trigger:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .rr-user-trigger::after {
    content: '';
    width: 0; height: 0;
    border-left: 3px solid transparent;
    border-right: 3px solid transparent;
    border-top: 3px solid currentColor;
    flex-shrink: 0;
  }

  .rr-user-avatar {
    width: 24px; height: 24px;
    display: grid; place-items: center;
    background: var(--accent);
    color: var(--accent-text);
    border-radius: 50%;
    font-weight: 700;
    font-size: 11px;
    flex-shrink: 0;
  }

  .rr-user-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    max-width: 100px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Static menu item (email row in user menu): not clickable. */
  .rr-menu-static {
    color: var(--text-muted);
    font-size: 12px;
    cursor: default;
  }
  .rr-menu-static:hover,
  .rr-menu-static.rr-menuitem-active { background-color: transparent; }

  /* Sign-in inline error pill (header signed-out state). */
  .rr-user-error {
    font-size: 10px;
    font-weight: 600;
    color: #ffffff;
    background: var(--error);
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* SignInPrompt: extends .rr-empty with primary action button. */
  .rr-signin-prompt-action {
    margin-top: 8px;
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
  }
  .rr-signin-prompt-action:hover {
    opacity: 0.9;
    border-color: var(--accent);
    color: var(--accent-text);
  }
  .rr-signin-prompt-action:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Contacts tab content stack. */
  .rr-contacts-content {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* JobPicker trigger: full-width dropdown button. */
  .rr-job-picker-wrap { display: flex; flex-direction: column; }
  .rr-job-picker {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font: inherit;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
  }
  .rr-job-picker:hover { border-color: var(--text-muted); }
  .rr-job-picker:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .rr-job-picker[aria-expanded="true"] { border-color: var(--accent); }
  .rr-job-picker:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }
  .rr-job-picker::after {
    content: '';
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 4px solid currentColor;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .rr-job-picker-label {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rr-job-picker-placeholder { color: var(--text-muted); }

  /* Entitlements subtitle bar. */
  .rr-entitlements-bar {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    min-height: 18px;
  }
  .rr-entitlements-upgrade {
    font-size: 12px;
  }

  /* Inline "pick a job" hint below picker. */
  .rr-contacts-empty {
    padding: 32px 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.5;
  }

  /* Find contacts primary action: full-width accent button. */
  .rr-find-contacts-btn {
    width: 100%;
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
    padding: 10px 14px;
    margin-top: 4px;
  }
  .rr-find-contacts-btn:hover {
    opacity: 0.9;
    border-color: var(--accent);
    color: var(--accent-text);
  }
  .rr-find-contacts-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Inline-spinner sizing override (used inside buttons). */
  .rr-spinner-inline {
    width: 12px; height: 12px;
    border-width: 1.5px;
    display: inline-block;
    vertical-align: -2px;
    margin-right: 6px;
  }

  /* Wave 2 task 1 continuation: search form, contact list, contact card. */

  .rr-search-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .rr-search-form-heading {
    margin: 0 0 4px 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .rr-search-form-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 4px;
  }
  .rr-search-form-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font: inherit;
    font-size: 13px;
  }
  .rr-search-form-input:focus {
    outline: 2px solid var(--accent);
    outline-offset: -1px;
    border-color: var(--accent);
  }
  .rr-search-form-submit {
    width: 100%;
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
    padding: 10px 14px;
    margin-top: 8px;
  }
  .rr-search-form-submit:hover { opacity: 0.9; border-color: var(--accent); color: var(--accent-text); }
  .rr-search-form-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .rr-search-form-error {
    font-size: 12px;
    color: var(--error);
    padding: 6px 10px;
    background: rgba(192, 57, 43, 0.08);
    border-radius: 6px;
    margin-top: 4px;
  }

  /* Context bar above the contact list. */
  .rr-context-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text-muted);
    padding: 4px 0 8px;
    flex-wrap: wrap;
  }
  .rr-context-bar-link {
    font-size: 12px;
  }

  /* Contact list + cards. */
  .rr-contact-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .rr-contact-list-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 8px;
    padding: 24px 16px;
  }

  .rr-contact-card {
    display: flex;
    gap: 10px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
  }
  .rr-contact-avatar {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    border-radius: 50%;
    background: var(--surface);
    color: var(--text-muted);
    display: grid;
    place-items: center;
    font-weight: 700;
    font-size: 13px;
    overflow: hidden;
  }
  .rr-contact-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .rr-contact-body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .rr-contact-header {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .rr-contact-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .rr-confidence-badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .rr-confidence-verified { background: #dcfce7; color: #166534; }
  .rr-confidence-pattern  { background: #fef3c7; color: #92400e; }
  @media (prefers-color-scheme: dark) {
    .rr-confidence-verified { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
    .rr-confidence-pattern  { background: rgba(234, 179, 8, 0.2); color: #fbbf24; }
  }
  .rr-contact-linkedin {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 4px;
    color: var(--text-muted);
    flex-shrink: 0;
    text-decoration: none;
  }
  .rr-contact-linkedin:hover { background-color: var(--surface); color: var(--text); }
  .rr-contact-linkedin:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .rr-contact-linkedin svg { width: 14px; height: 14px; display: block; }

  .rr-contact-title-text {
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rr-contact-meta {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    flex-wrap: wrap;
  }
  .rr-contact-role { font-weight: 600; }
  .rr-contact-action-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 6px;
  }
  .rr-unlock-btn {
    width: 100%;
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
    padding: 8px 12px;
    font-size: 12px;
  }
  .rr-unlock-btn:hover { opacity: 0.9; border-color: var(--accent); color: var(--accent-text); }
  .rr-unlock-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .rr-contact-email {
    font-size: 12px;
    color: var(--text);
    user-select: text;
    word-break: break-all;
  }
  .rr-contact-copy {
    font-size: 12px;
    align-self: flex-start;
  }
  .rr-pattern-caveat {
    font-size: 11px;
    color: var(--text-muted);
    font-style: italic;
  }
  .rr-contact-error-pill {
    font-size: 11px;
    color: var(--error);
    padding: 4px 8px;
    background: rgba(192, 57, 43, 0.08);
    border-radius: 4px;
  }
  .rr-contact-paywall {
    font-size: 12px;
    color: var(--text);
    padding: 8px;
    background: var(--surface);
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }
</style>
</head>
<body data-state="loading">
  <header class="rr-header">
    <div class="rr-brand">
      <div class="rr-logo" aria-hidden="true">R</div>
      <h1 class="rr-title" data-i18n="brand.name">ReplyRate</h1>
    </div>
    <div class="rr-header-actions">
      <div id="rr-save-active-tab-slot"></div>
      <div id="rr-user-menu"></div>
    </div>
  </header>

  <main class="rr-main">
    <section class="rr-state rr-state-loading" data-show-on="loading" aria-busy="true">
      <div class="rr-spinner" aria-hidden="true"></div>
      <p class="rr-state-msg" data-i18n="state.loading.msg">Loading your workspace</p>
    </section>

    <section class="rr-state rr-state-collapsed" data-show-on="collapsed">
      <p class="rr-state-msg" data-i18n="state.collapsed.msg">Panel is idle. Open a supported job page to get started.</p>
      <button class="rr-btn" id="rr-expand-btn" data-i18n="state.collapsed.action">Expand</button>
    </section>

    <section class="rr-state rr-state-ready" data-show-on="ready">
      <div id="rr-app-root"></div>
    </section>

    <section class="rr-state rr-state-error" data-show-on="error" role="alert">
      <p class="rr-state-msg" id="rr-error-msg" data-i18n="state.error.msg">Something went wrong loading the panel.</p>
      <button class="rr-btn" id="rr-retry-btn" data-i18n="state.error.action">Retry</button>
    </section>
  </main>

  <script src="sidepanel.js"></script>
</body>
</html>
